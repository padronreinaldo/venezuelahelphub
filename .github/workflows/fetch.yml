name: Actualizar datos cada hora

on:
  schedule:
    # Cada 30 min (UTC). El cron de GitHub Actions es best-effort y a veces se salta
    # corridas bajo carga; 30 min reduce el tiempo que el sitio se ve desactualizado.
    - cron: "*/30 * * * *"
  workflow_dispatch: {}       # permite ejecutarlo a mano desde la pestaña Actions

permissions:
  contents: write

concurrency:
  group: fetch-data
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Obtener datos de fuentes legítimas
        run: node scripts/fetch.js

      - name: Commit si hay cambios
        run: |
          git config user.name "relief-hub-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/updates.json data/news.json data/meta.json
          if git diff --staged --quiet; then
            echo "Sin cambios."
          else
            git commit -m "chore: actualización automática de datos ($(date -u +'%Y-%m-%d %H:%M UTC'))"
            git push
          fi
