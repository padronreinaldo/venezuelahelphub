name: Actualizar datos cada hora

on:
  schedule:
    - cron: "0 * * * *"      # cada hora, minuto 0 (UTC). Cada 30 min: "0,30 * * * *"
  workflow_dispatch: {}       # permite ejecutarlo a mano desde la pestaña Actions

permissions:
  contents: write

concurrency:
  group: fetch-data
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Obtener datos de fuentes legítimas
        run: node scripts/fetch.js

      - name: Commit si hay cambios
        run: |
          git config user.name "relief-hub-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/updates.json data/news.json
          if git diff --staged --quiet; then
            echo "Sin cambios."
          else
            git commit -m "chore: actualización automática de datos ($(date -u +'%Y-%m-%d %H:%M UTC'))"
            git push
          fi
